            { id: 'q5', type: 'checkbox', text: '5. 主要優先順序 (請勾選前 3 名)', options: ['短影音', '內部教材', '提案 / 招標輔助', '對外宣傳', '其他'] },

            { id: 'q20', type: 'radio', text: '20. 偏好的製作模式', options: ['沒素材，希望 AI 幫忙生', '有素材，希望 AI 協助整理與剪輯', '兩種都可能', '先用 AI 草稿，再改成正式版'] },
            { id: 'q21', type: 'radio', text: '21. 是否可接受 AI 生成畫面', options: ['可以，先求快', '可以，但只限內部或測試', '可以，但不能有侵權疑慮', '不希望使用 AI 自動生成畫面', '不確定，想先了解風險'] },

          ],

            { id: 'q26', type: 'checkbox', text: '26. 您最在意的風險是什麼', options: ['版權', '肖像權', '商用授權', '客戶 / 提案場合出現爭議', '平台條款不清楚', '內容不夠正確', '資料外流', '其他'] },
            { id: 'q27', type: 'radio', text: '27. 使用場景的風險容忍度', options: ['高：可先試，再慢慢修正', '中：可接受有限風險，但要控管', '低：需盡量合法、可追溯、可稽核'] },
            { id: 'q28', type: 'checkbox', text: '28. 是否會用於以下高敏感情境', options: ['正式招標提案', '大型客戶簡報', '對外正式宣傳', '廣告投放', '長期品牌形象', '都不會', '其他'] },
            { id: 'q29', type: 'radio', text: '29. 是否需要保留素材來源與授權紀錄', options: ['需要', '視情況', '不需要', '不清楚這項用途'] },
            { id: 'q30', type: 'radio', text: '30. 是否需要內部審核流程', options: ['不需要，個人可直接做', '部門主管審核', '法務 / 合約審核', '品牌 / 行銷審核', '多層審核', '尚未建立'] }
          ],

            { id: 'q32', type: 'checkbox', text: '32. 現有工具熟悉度', options: ['Canva', 'CapCut', 'PowerPoint', 'Premiere', 'DaVinci Resolve', '螢幕錄影工具', '完全沒有經驗', '其他'] },
            { id: 'q33', type: 'radio', text: '33. 希望工具的使用門檻', options: ['非常簡單，幾乎不需學習', '可接受中等學習成本', '專業工具也可以，只要值得', '先求好用，再談進階'] },
            { id: 'q34', type: 'checkbox', text: '34. 希望製作流程', options: ['文字輸入就成片', '模板套用快速出片', '既有素材拼接成片', '簡報直接轉影片', '螢幕錄影 + 後製', '分鏡設計後再做', '其他'] },
            { id: 'q35', type: 'radio', text: '35. 單支影片可接受製作時間', options: ['10 分鐘內', '30 分鐘內', '半天內', '1 天內', '可接受較長時間，只要品質好'] }
          ],
          budget: [
            { id: 'q36', type: 'radio', text: '36. 預算接受度', options: ['先免費試用', '低成本（月費型）', '可接受商用付費工具', '可接受企業版', '尚未決定'] },
            { id: 'q37', type: 'radio', text: '37. 希望採用方式', options: ['單一工具即可', '兩到三種工具搭配', '先測試，之後再定標準工具', '希望建立公司標準流程'] },
            { id: 'q38', type: 'checkbox', text: '38. 對導入成果的期待', options: ['先做出一支可用影片', '建立一套內部製作方法', '建立教材製作模板', '建立短影音快速產線', '建立合規與審核流程', '其他'] },
            { id: 'q41', type: 'radio', text: '41. 若只能先做一個小試點，您最想先做哪個', options: ['15 秒短影音', '1 支內部教材', '1 支 SOP 教學影片', '1 支提案輔助影片', '其他'] }
          ]
        };

        // --- 主程式 ---
        function App() {
          const [activeSection, setActiveSection] = useState(SECTIONS[0].id);
          const [answers, setAnswers] = useState({});

          const handleSelect = (qId, option, type) => {
            setAnswers(prev => {
              const current = prev[qId] || [];
              if (type === 'radio') {
                return { ...prev, [qId]: [option] };
              } else {
                if (current.includes(option)) {
                  return { ...prev, [qId]: current.filter(o => o !== option) };
                } else {
                  return { ...prev, [qId]: [...current, option] };
                }
              }
            });
          };

          const handleTextChange = (qId, text) => {
            setAnswers(prev => ({ ...prev, [qId]: text }));
          };

          const renderQuestion = (q) => {
            if (q.type === 'header') {
              return (
                <div key={q.id} className="mt-8 mb-4 border-b border-slate-200 pb-2">
                  <h3 className="text-xl font-bold text-slate-800">{q.text}</h3>
                </div>
              );
            }

            const hasOther = q.options.includes('其他');
            const isOtherSelected = Array.isArray(answers[q.id]) && answers[q.id].includes('其他');

            return (
              <div key={q.id} className="mb-6 lg:mb-8 p-5 lg:p-6 bg-white rounded-xl border border-slate-200 shadow-sm hover:shadow-md transition-shadow">
                <h4 className="text-base font-semibold text-slate-800 mb-4">{q.text}</h4>
                
                {q.type === 'textarea' ? (
                  <textarea
                    className="w-full p-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 min-h-[100px] text-sm outline-none"
                    placeholder="請簡述您的想法..."
                    value={answers[q.id] || ''}
                    onChange={(e) => handleTextChange(q.id, e.target.value)}
                  />
                ) : (
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                    {q.options.map(option => {
                      const isSelected = Array.isArray(answers[q.id]) && answers[q.id].includes(option);
                      const isOther = option === '其他';
                      
                      return (
                        <div key={option} className={`flex flex-col sm:flex-row sm:items-start ${isOther && isSelected ? 'col-span-1 md:col-span-2' : ''}`}>
                          <button
                            onClick={() => handleSelect(q.id, option, q.type)}
                            className={`w-full flex items-center p-3 rounded-lg border text-left transition-colors ${
                              isSelected 
                                ? 'bg-blue-50 border-blue-600 text-blue-800' 
                                : 'bg-white border-slate-200 text-slate-600 hover:bg-slate-50 hover:border-slate-300'
                            }`}
                          >
                            <div className={`w-5 h-5 flex-shrink-0 mr-3 border flex items-center justify-center ${
                              q.type === 'radio' ? 'rounded-full' : 'rounded'
                            } ${isSelected ? 'border-blue-600 bg-blue-600' : 'border-slate-300'}`}>
                              {isSelected && <IconCheck className="w-3.5 h-3.5 text-white" />}
                            </div>
                            <span className="text-sm font-medium">{option}</span>
                          </button>
                          {isOther && isSelected && (
                            <input
                              type="text"
                              className="mt-2 sm:mt-0 sm:ml-3 w-full sm:flex-1 p-3 sm:p-2 border rounded-lg sm:rounded-none sm:border-0 sm:border-b border-slate-300 focus:border-blue-500 focus:outline-none bg-white sm:bg-transparent text-sm shadow-sm sm:shadow-none"
                              placeholder="請說明您的其他想法..."
                              autoFocus
                            />
                          )}
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            );
          };

          const getCompletedCount = (sectionId) => {
            const sectionQs = QUESTIONS[sectionId].filter(q => q.type !== 'header');
            return sectionQs.filter(q => answers[q.id] && answers[q.id].length > 0).length;
          };

          const handleExportCSV = () => {
            let csvContent = '\uFEFF'; 
            csvContent += '區塊,題目編號與內容,填寫結果\n';

            const escapeCSV = (str) => {
              if (str === null || str === undefined) return '"未填寫"';
              const strVal = String(str);
              return `"${strVal.replace(/"/g, '""')}"`;
            };

            SECTIONS.forEach(section => {
              const sectionQs = QUESTIONS[section.id].filter(q => q.type !== 'header');
              
              sectionQs.forEach(q => {
                let answerText = '未填寫';
                const ans = answers[q.id];

                if (ans) {
                  if (Array.isArray(ans)) {
                    if (ans.length > 0) answerText = ans.join('; ');
                  } else if (typeof ans === 'string' && ans.trim() !== '') {
                    answerText = ans.trim();
                  }
                }

                csvContent += `${escapeCSV(section.title)},${escapeCSV(q.text)},${escapeCSV(answerText)}\n`;
              });
            });

            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `地平線AI影片需求盤點_${new Date().toISOString().slice(0,10)}.csv`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
          };

          const totalQuestions = QUESTIONS[activeSection].filter(q => q.type !== 'header').length;

          return (
            <div className="min-h-screen font-sans text-slate-900 flex overflow-x-hidden">
              {/* Sidebar - Desktop Only */}
              <aside className="w-72 bg-white border-r border-slate-200 flex-shrink-0 flex flex-col fixed h-full z-20 hidden lg:flex">
                <div className="p-6 border-b border-slate-200">
                  <h1 className="text-xl font-bold text-slate-900 leading-tight">地平線 AI 影片<br/>需求盤點問卷</h1>
                  <p className="text-xs text-slate-500 mt-2">v1.0 數位評估版</p>
                </div>
                <div className="flex-1 overflow-y-auto py-4">
                  <nav className="space-y-1 px-3">
                    {SECTIONS.map((section) => {
                      const Icon = section.icon;
                      const isActive = activeSection === section.id;
                      const isCompleted = getCompletedCount(section.id) > 0;
                      
                      return (
                        <button
                          key={section.id}
                          onClick={() => setActiveSection(section.id)}
                          className={`w-full flex items-center justify-between px-3 py-3 rounded-lg text-left transition-colors ${
                            isActive 
                              ? 'bg-blue-50 text-blue-700 font-semibold' 
                              : 'text-slate-600 hover:bg-slate-100 hover:text-slate-900'
                          }`}
                        >
                          <div className="flex items-center space-x-3">
                            <Icon className={`w-5 h-5 flex-shrink-0 ${isActive ? 'text-blue-600' : 'text-slate-400'}`} />
                            <span className="text-sm">{section.title}</span>
                          </div>
                          {isCompleted && !isActive && <IconCheckCircle2 className="w-4 h-4 text-green-500 flex-shrink-0" />}
                        </button>
                      );
                    })}
                  </nav>
                </div>
                <div className="p-4 border-t border-slate-200">
                  <button 
                    onClick={handleExportCSV}
                    className="w-full bg-slate-900 text-white rounded-lg py-2.5 text-sm font-semibold hover:bg-slate-800 transition-colors flex items-center justify-center space-x-2 shadow-sm"
                  >
                    <span>輸出 CSV 報告</span>
                    <IconDownload className="w-4 h-4" />
                  </button>
                </div>
              </aside>

              {/* Main Content */}
              <main className="flex-1 lg:ml-72 flex flex-col h-screen w-full relative">
                {/* Mobile Header - Sticky with shadow */}
                <div className="lg:hidden bg-white border-b border-slate-200 p-4 sticky top-0 z-30 shadow-sm flex items-center justify-between">
                  <h1 className="text-lg font-bold text-slate-900 truncate pr-2">AI 影片需求盤點</h1>
                  <div className="relative flex-shrink-0">
                    <select 
                      value={activeSection}
                      onChange={(e) => setActiveSection(e.target.value)}
                      className="appearance-none bg-slate-50 border border-slate-200 text-sm font-medium text-slate-700 rounded-md py-1.5 pl-3 pr-8 focus:outline-none focus:ring-2 focus:ring-blue-500 max-w-[140px] truncate"
                    >
                      {SECTIONS.map(s => <option key={s.id} value={s.id}>{s.title}</option>)}
                    </select>
                    <IconChevronRight className="w-4 h-4 text-slate-400 absolute right-2 top-1/2 -translate-y-1/2 rotate-90 pointer-events-none" />
                  </div>
                </div>

                {/* Content Area */}
                <div className="flex-1 overflow-y-auto p-4 sm:p-6 lg:p-10 pb-20 lg:pb-10">
                  <div className="max-w-3xl mx-auto">
                    {/* Section Header */}
                    <div className="mb-6 lg:mb-8">
                      <div className="flex items-center space-x-3 mb-2">
                        {React.createElement(SECTIONS.find(s => s.id === activeSection).icon, { className: "w-7 h-7 lg:w-8 lg:h-8 text-blue-600 flex-shrink-0" })}
                        <h2 className="text-xl lg:text-2xl font-bold text-slate-900">
                          {SECTIONS.find(s => s.id === activeSection).title}
                        </h2>
                      </div>
                      <p className="text-slate-500 text-sm">
                        {SECTIONS.find(s => s.id === activeSection).desc}
                      </p>
                      
                      {/* Progress Indicator */}
                      <div className="mt-4 flex items-center space-x-4">
                        <div className="flex-1 h-2 bg-slate-200 rounded-full overflow-hidden">
                          <div 
                            className="h-full bg-blue-500 transition-all duration-300"
                            style={{ width: `${(getCompletedCount(activeSection) / totalQuestions) * 100}%` }}
                          />
                        </div>
                        <span className="text-xs font-medium text-slate-500 whitespace-nowrap">
                          {getCompletedCount(activeSection)} / {totalQuestions} 已填寫
                        </span>
                      </div>
                    </div>

                    {/* Questions Form */}
                    <div className="space-y-4 lg:space-y-6">
                      {QUESTIONS[activeSection].map(renderQuestion)}
                    </div>

                    {/* Bottom Navigation - RWD Stacked on Mobile */}
                    <div className="mt-8 pt-6 border-t border-slate-200 flex flex-col-reverse sm:flex-row justify-between gap-3 sm:gap-4">
                      <button 
                        onClick={() => {
                          const currIdx = SECTIONS.findIndex(s => s.id === activeSection);
                          if(currIdx > 0) setActiveSection(SECTIONS[currIdx - 1].id);
                          window.scrollTo(0, 0); 
                        }}
                        className={`w-full sm:w-auto px-6 py-3 sm:py-2 text-sm font-medium rounded-lg border flex items-center justify-center transition-colors ${
                          SECTIONS.findIndex(s => s.id === activeSection) === 0 
                          ? 'text-slate-300 border-slate-200 cursor-not-allowed' 
                          : 'text-slate-600 border-slate-300 hover:bg-slate-50 active:bg-slate-100'
                        }`}
                        disabled={SECTIONS.findIndex(s => s.id === activeSection) === 0}
                      >
                        上一區塊
                      </button>
                      
                      <button 
                        onClick={() => {
                          const currIdx = SECTIONS.findIndex(s => s.id === activeSection);
                          if(currIdx < SECTIONS.length - 1) {
                            setActiveSection(SECTIONS[currIdx + 1].id);
                            window.scrollTo(0, 0); 
                          } else {
                            handleExportCSV();
                          }
                        }}
                        className={`w-full sm:w-auto px-6 py-3 sm:py-2 text-sm font-medium rounded-lg flex items-center justify-center space-x-2 transition-colors ${
                          SECTIONS.findIndex(s => s.id === activeSection) === SECTIONS.length - 1
                          ? 'bg-blue-600 text-white shadow-sm hover:bg-blue-700 active:bg-blue-800' 
                          : 'bg-slate-900 text-white hover:bg-slate-800 active:bg-slate-700'
                        }`}
                      >
                        <span>{SECTIONS.findIndex(s => s.id === activeSection) === SECTIONS.length - 1 ? '輸出 CSV 報告' : '下一區塊'}</span>
                        {SECTIONS.findIndex(s => s.id === activeSection) === SECTIONS.length - 1 ? (
                          <IconDownload className="w-4 h-4 ml-1" />
                        ) : (
                          <IconChevronRight className="w-4 h-4 ml-1 hidden sm:block" />
                        )}
                      </button>
                    </div>
                  </div>
                </div>
              </main>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
